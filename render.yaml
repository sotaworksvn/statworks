services:
  - type: web
    name: sota-statworks-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DEV_MODE
        value: "false"
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY_1
        sync: false
      - key: OPENAI_API_KEY_2
        sync: false
      - key: OPENAI_API_KEY_3
        sync: false
      - key: OPENAI_API_KEY_4
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
