services:
  - type: web
    name: sota-statworks-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEV_MODE
        value: "false"
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY_1
        sync: false
      - key: OPENAI_API_KEY_2
        sync: false
      - key: OPENAI_API_KEY_3
        sync: false
      - key: OPENAI_API_KEY_4
        sync: false
